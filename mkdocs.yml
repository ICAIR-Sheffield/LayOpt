site_name: LayOpt
site_url: https://LayOpt.readthedocs.io/
site_author: "Neil Shephard"

repo_name: "ICAIR-Sheffield/layopt"
repo_url: "https://github.com/ICAIR-Sheffield/LayOpt"

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - search.suggest
    - search.highlight
    - navigation.expand
    - navigation.tracking
    - toc.follow
  palette:
    # See options to customise your color scheme here:
    # https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

plugins:
  autorefs: {}
  mermaid2: {}
  mkdocstrings:
    handlers:
      python:
        paths: [src]
        inventories:
          - https://docs.python.org/3/objects.inv
          - https://docs.pydantic.dev/latest/objects.inv
        options:
          docstrings_style: numpy
          docstring_section_style: table
          filters: ["!^_"]
          members_order: source
          separate_signature: true
          show_if_no_docstring: false
          show_root_full_path: false
          show_root_heading: false
          show_signature_annotations: false
          show_source: true
  search: {}

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid

nav:
  - Home: index.md
  - Installation: installation.md
  - Contributing: contributing.md
  - Usage: usage.md
  - Python API:
      - API: api/index.md
      - config: api/config.md
      - entry_point: api/entry_point.md
      - io: api/io.md
      - layopt: api/layopt.md
      - logging: api/logging.md
      - run_modules: api/run_modules.md
      - validation: api/validation.md

watch:
  - docs/
  - src/
